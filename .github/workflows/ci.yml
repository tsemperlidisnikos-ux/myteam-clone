name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

env:
  DATABASE_URL: postgres://postgres:postgres@localhost:5432/myteam_test
  JWT_SECRET: ci-test-jwt-secret-min-32-chars!!
  FRONTEND_URL: http://localhost:5173
  NODE_ENV: test
  PLAYWRIGHT_EMAIL: ci@myteam.local
  PLAYWRIGHT_PASSWORD: ci123456

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: myteam_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install & test backend
        working-directory: backend
        run: |
          npm ci
          npm run migrate
          npm test

  frontend-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build

  e2e:
    runs-on: ubuntu-latest
    needs: [backend]
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: myteam_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install backend deps & seed CI user
        working-directory: backend
        run: |
          npm ci
          npm run migrate
          npm run seed:ci

      - name: Install frontend deps & Playwright
        working-directory: frontend
        run: |
          npm ci
          npx playwright install chromium --with-deps

      - name: Run E2E tests
        working-directory: frontend
        env:
          PLAYWRIGHT_EMAIL: ci@myteam.local
          PLAYWRIGHT_PASSWORD: ci123456
        run: npm run test:e2e
