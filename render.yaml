# Render.com — one-click deploy (API + PostgreSQL free tier)
# Dashboard: https://dashboard.render.com/select-repo?type=blueprint
# Or connect repo and Render detects this file automatically.

databases:
  - name: myteam-db
    plan: free
    databaseName: myteam
    user: myteam

services:
  - type: web
    name: myteam-api
    runtime: node
    rootDir: backend
    plan: free
    buildCommand: npm ci
    startCommand: npm run migrate && npm start
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: myteam-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "5000"
      - key: FRONTEND_URL
        sync: false
